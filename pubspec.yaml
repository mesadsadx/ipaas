name: nutritrack
description: Nutrition tracker with AI photo recognition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.3.2

  # Image picker & camera
  image_picker: ^1.1.2

  # Barcode scanner
  mobile_scanner: ^5.2.3

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
